name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        # Only what the unit tests import — Kafka isn't exercised here.
        # opencv-python-headless avoids the libGL system dependency on CI runners.
        run: pip install pillow numpy opencv-python-headless pytest
      - name: Run tests
        run: pytest tests/ -q
